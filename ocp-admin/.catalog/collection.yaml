id: openshift-administration
name: Agentic skill pack for Red Hat OpenShift
provider: Red Hat
version: 0.1.0
categories:
- Red Hat
- Openshift
- Administration
- Management
personas:
- OpenShift Administrator
marketplaces:
- Claude Code
- Cursor
support_level: Unknown
maturity: GREEN
description: Automation capabilities for OpenShift Container Platform cluster management, workload orchestration, security
  policies, and operational tasks.
summary: |
  The ocp-admin collection covers Assisted Installer cluster creation, multi-cluster discovery across self-managed and managed
  OpenShift, and kubeconfig-backed fleet health reporting. Use CLAUDE.md intent routing to pick `/cluster-creator`,
  `/cluster-inventory`, or `/cluster-report`.
contents:
  description: |
    The pack provides three skills for cluster lifecycle and fleet visibility on OpenShift, using Assisted Installer and OCM APIs
    where applicable and read-only cluster APIs for consolidated reports.
  skills:
  - name: cluster-creator
    description: End-to-end OpenShift cluster creation using Red Hat Assisted Installer (SNO and HA; bare metal, vSphere, OCI, Nutanix).
    summary_markdown: |
      Create and install OpenShift clusters through Assisted Installer with validation, host networking, and progress monitoring.
      **Use when:**
      - "Create a new OpenShift cluster"
      - "Install OpenShift on my servers"
      - "Set up a single-node cluster"
      **What it does:**
      - Drives Assisted Installer flows with explicit approval for VIPs, host roles, and install triggers.
      - Surfaces installation events and validation errors until the cluster reaches ready state.
  - name: cluster-inventory
    description: List and inspect OpenShift clusters across self-managed (OCP, SNO) and managed service (ROSA, ARO, OSD) deployments.
    summary_markdown: |
      List clusters, versions, platforms, and status from OCM and Assisted Installer contexts using a single offline token workflow.
      **Use when:**
      - "List all clusters"
      - "Show cluster status"
      - "What clusters are available?"
      **What it does:**
      - Returns identifiers, versions, platforms, and creation metadata for fleet visibility.
      - Separates self-managed versus managed-service clusters for the right API path.
  - name: cluster-report
    description: Consolidated health report across kubeconfig contexts, skipping non-OpenShift contexts by default.
    summary_markdown: |
      Aggregate node, namespace, and workload signals across contexts that resolve to real OpenShift clusters.
      **Use when:**
      - "Health report across clusters"
      - "Fleet summary from kubeconfig"
      - "Compare resource usage between contexts"
      **What it does:**
      - Verifies each context is OpenShift before collecting metrics to avoid kube API errors.
      - Summarizes capacity, GPU presence, and pod health for operations review.
  orchestration_skills: []
  skills_decision_guide:
  - user_request: '"Create cluster" or "install OpenShift with Assisted Installer"'
    skill_to_use: cluster-creator
    reason: Provisions SNO or HA clusters and monitors install through completion.
  - user_request: '"List clusters" or "cluster status in OCM/ROSA"'
    skill_to_use: cluster-inventory
    reason: Inventory across managed and self-managed targets with consistent fields.
  - user_request: '"Fleet health" or "multi-cluster report from kubeconfig"'
    skill_to_use: cluster-report
    reason: Read-only aggregation after OpenShift context verification.
mcp_section: '#mcp_section.md'
deploy_and_use: '#deploy_and_use.md'
sample_workflows:
- name: Assisted install then verify
  workflow: |
    User: "Create an HA cluster on bare metal and tell me when it is ready"
    - `/cluster-creator` walks prerequisites, manifests, and installation monitoring with approvals at critical steps
    - `/cluster-inventory` confirms version and state once the API shows the new cluster
- name: Fleet visibility
  workflow: |
    User: "List everything in my Red Hat account and flag stale check-ins"
    - `/cluster-inventory` returns self-managed and managed clusters with metadata for triage
- name: Multi-cluster health
  workflow: |
    User: "Summarize node and pod health for every OpenShift context in my kubeconfig"
    - `/cluster-report` skips non-OpenShift contexts and aggregates signals for operators
