# Catalog: maintained via create-collection workflow (assistant + maintainer + PR review).
# Golden sources: skills/*/SKILL.md, README.md, CLAUDE.md, marketplace/rh-agentic-collection.yml
# Do not edit ad hoc — follow COLLECTION_SPEC.md and the create-collection skill.

id: rh-support-engineer
name: Red Hat Support Engineer Agentic Skills Collection
provider: Red Hat
version: 0.1.0
categories:
- Support
- Red Hat
personas:
- Support Engineer
marketplaces:
- Claude Code
- Cursor
- ChatGPT
support_level: Unknown
description: Technical support and troubleshooting tools for Red Hat products and platforms, including diagnostics, issue
  resolution, knowledge workflows, and customer-ready guidance.
summary: |
  The rh-support-engineer pack is reserved for future support-focused skills. It currently ships documentation-only metadata
  so the union registry and docs site stay aligned; add `skills/<name>/SKILL.md` before advertising automation here.
contents:
  description: |
    The pack has no `skills/` directory yet. When skills land, list each exactly once under `contents.skills` or
    `contents.orchestration_skills` and extend this catalog from SKILL.md, README, and CLAUDE sources.
  skills: []
  orchestration_skills: []
  skills_decision_guide: []
deploy_and_use: |
  ## Install (Lola)
  This path is listed in `docs/plugins.json` for discoverability. When a marketplace module is published with `path:
  rh-support-engineer`, install from `marketplace/rh-agentic-collection.yml` and follow the pack `README.md` for prerequisites.
sample_workflows:
- name: Adopt the pack when skills exist
  workflow: |
    User: "I want to use the support engineer pack in my assistant"
    - Read `README.md` for persona and marketplace targets
    - After skills are added, follow CLAUDE intent routing and invoke `/skill-name` via the Skill tool
