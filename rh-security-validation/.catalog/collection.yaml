id: rh-security-validation
name: Red Hat Security Validation
provider: Red Hat
version: 0.1.0
categories:
- Security
- Container Security
- Vulnerability Management
personas:
- Security Engineer
- Platform Engineer
- DevSecOps
marketplaces:
- Claude Code
support_level: Unknown
maturity: ORANGE
description: "Advanced CVE validation for Red Hat container images and OpenShift CoreOS using official SBOMs and VEX data."
summary: |
  Validates CVEs against Red Hat container images and CoreOS nodes using official
  SBOM attestations, Red Hat VEX/CSAF data, and CVE metadata from MITRE/OSV.dev.
  Eliminates false positives from security scanners and provides clear remediation
  guidance including layered product relationships and newer image availability.
contents:
  description: |
    The pack provides 4 skills for Red Hat container security validation,
    supported by 9 helper scripts for deterministic data fetching.
  orchestration_skills: []
  skills_decision_guide:
  - user_request: '"Validate this CVE against my container image" or "Is CVE-X a false positive?"'
    skill_to_use: container-cve-validator
    reason: Full validation pipeline using SBOM attestations, Red Hat VEX data, and newer image scanning.
  - user_request: '"Check if this CVE affects CoreOS in OCP 4.20" or "Validate RHSA against RHCOS"'
    skill_to_use: coreos-cve-validator
    reason: Extracts CoreOS RPM list, validates against VEX with RHEL EUS stream awareness.
  - user_request: '"What packages does CVE-X affect?" or "Look up CVE details"'
    skill_to_use: cve-recon
    reason: Quick CVE metadata lookup from MITRE, OSV.dev, and Go vulnerability database.
  - user_request: '"Inspect this container image" or "What SBOM does this image have?"'
    skill_to_use: image-inspect
    reason: Fetches image labels, registry ownership, and SBOM artifact reference.
  skills:
  - name: container-cve-validator
    description: Container Image CVE Validation
    summary_markdown: |
      Full CVE validation pipeline for Red Hat container images. Extracts official
      SBOM attestations, checks Red Hat VEX data, performs version comparison,
      scans for newer patched images, and detects VEX data gaps. Supports CVE IDs
      and RHSA advisory IDs as input, with batch scanning via CSV files.
  - name: coreos-cve-validator
    description: CoreOS CVE Validation
    summary_markdown: |
      CVE validation for Red Hat Enterprise Linux CoreOS (RHCOS) in specific OCP
      releases. Extracts RPM packages from CoreOS images, classifies by source
      (RHEL/OCP/Fast Datapath), validates against VEX data with RHEL EUS stream
      awareness, and detects RHCOS VEX discrepancies.
  - name: cve-recon
    description: CVE Reconnaissance
    summary_markdown: |
      Queries MITRE CVE API, OSV.dev, and Go vulnerability database to produce
      a structured report of affected packages, ecosystems, and vulnerable
      version ranges for a given CVE ID.
  - name: image-inspect
    description: Container Image Inspection
    summary_markdown: |
      Fetches container image labels, validates registry ownership, resolves
      tag/digest via SBOM, and reports the SBOM artifact OCI reference.
deploy_and_use: '#deploy_and_use.md'
documentation_section: '#documentation_section.md'
mcp_section: |
  This pack does not use MCP servers. All data fetching is performed via
  local Python helper scripts that call public APIs directly.
security_model: '#security_model.md'
sample_workflows:
- name: Container CVE validation
  workflow: |
    User: "Is CVE-2024-45490 a real issue in registry.redhat.io/ubi9/ubi:latest?"
    - container-cve-validator extracts SBOM, checks VEX, confirms true/false positive with remediation
- name: Scanner RHSA verification
  workflow: |
    User: "My scanner flagged RHSA-2026:3337 on our UBI9 image. Is this relevant?"
    - container-cve-validator resolves RHSA to CVEs, validates each against the image, reports which apply
- name: CoreOS vulnerability check
  workflow: |
    User: "Does CVE-2025-61726 affect CoreOS in OCP 4.20.16?"
    - coreos-cve-validator extracts RPMs, finds podman, checks VEX under OCP and RHEL EUS CPEs
- name: Quick CVE research
  workflow: |
    User: "What packages does CVE-2024-45490 affect?"
    - cve-recon queries MITRE, OSV.dev, returns affected packages with version ranges
resources:
- title: Red Hat Security Data
  url: https://security.access.redhat.com/
  description: Official Red Hat VEX/CSAF data, security advisories, and CVE information.
- title: MITRE CVE API
  url: https://cveawg.mitre.org/
  description: Authoritative CVE metadata source used for vulnerability reconnaissance.
- title: OSV.dev
  url: https://osv.dev/
  description: Open Source Vulnerability database with cross-references to Go, PyPI, npm ecosystems.
- title: Sigstore cosign
  url: https://github.com/sigstore/cosign
  description: Tool for downloading SBOM attestations from container images.
- title: regclient
  url: https://regclient.org/
  description: Registry client tool for remote image metadata inspection.
- title: Lola Package Manager
  url: https://github.com/RedHatProductSecurity/lola
  description: Package manager used to install agentic collections.
