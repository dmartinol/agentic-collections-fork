name: Federation Validation

on:
  pull_request:
    types: [labeled, opened, synchronize]

jobs:
  validate-federation:
    if: contains(github.event.pull_request.labels.*.name, 'federation')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks

      - name: Install dependencies
        run: |
          source $HOME/.cargo/env
          make install

      - name: Detect federated module changes
        id: detect
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          source $HOME/.cargo/env
          # Compare federated modules in PR vs base branch — only validate added/changed ones
          git show "origin/${BASE_REF}:marketplace/rh-agentic-collection.yml" > /tmp/base-marketplace.yml 2>/dev/null || echo "modules: []" > /tmp/base-marketplace.yml

          uv run python -c "
          import yaml, json, sys

          MAIN_REPO = 'https://github.com/RHEcosystemAppEng/agentic-collections'

          def load_federated(path):
              with open(path) as f:
                  data = yaml.safe_load(f) or {}
              return {
                  m['name']: m for m in (data.get('modules') or [])
                  if isinstance(m, dict)
                  and m.get('repository', '').rstrip('/') != MAIN_REPO
                  and m.get('repository')
              }

          base = load_federated('/tmp/base-marketplace.yml')
          head = load_federated('marketplace/rh-agentic-collection.yml')

          # Added or changed modules only
          changed = []
          for name, mod in head.items():
              if name not in base or mod != base[name]:
                  changed.append(mod)

          if not changed:
              print('No new or changed federated modules in this PR')
              sys.exit(0)

          print(f'Found {len(changed)} new/changed federated module(s)')
          for m in changed:
              print(f'  - {m.get(\"name\", \"unknown\")}: {m.get(\"repository\", \"?\")} @ {m.get(\"ref\", \"?\")}')

          with open('/tmp/federation-modules.json', 'w') as f:
              json.dump(changed, f)
          " || true

          if [ -f /tmp/federation-modules.json ]; then
            echo "has_modules=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_modules=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate federated modules
        id: validate
        if: steps.detect.outputs.has_modules == 'true'
        run: |
          source $HOME/.cargo/env
          uv run python -c "
          import json, subprocess, sys

          with open('/tmp/federation-modules.json') as f:
              modules = json.load(f)

          all_results = []
          failed = False
          for mod in modules:
              repo = mod.get('repository', '')
              ref = mod.get('ref', '')
              pack_path = mod.get('path', '.')
              skills = mod.get('skills')
              name = mod.get('name', 'unknown')

              print(f'\n--- Validating: {name} ---')
              if not ref:
                  print(f'Module {name} missing required ref (40-character commit SHA)')
                  failed = True
                  all_results.append({'name': name, 'report': None, 'catalog_report': None})
                  continue

              cmd = [sys.executable, 'scripts/validate_federation.py', repo, '--ref', ref, '--pack-path', pack_path, '--json',
                     '--module-json', json.dumps(mod)]
              if skills:
                  cmd.extend(['--skills'] + skills)

              result = subprocess.run(cmd, capture_output=True, text=True)
              print(result.stdout)
              if result.stderr:
                  print(result.stderr, file=sys.stderr)

              try:
                  report = json.loads(result.stdout)
              except json.JSONDecodeError:
                  report = None

              if result.returncode != 0:
                  failed = True

              cat_cmd = [
                  sys.executable, 'scripts/validate_federation_catalog.py',
                  '--module-name', name,
                  '--repo-url', repo,
                  '--ref', ref,
                  '--pack-path', pack_path,
                  '--module-json', json.dumps(mod),
                  '--json',
              ]
              cat_result = subprocess.run(cat_cmd, capture_output=True, text=True)
              print(cat_result.stdout)
              if cat_result.stderr:
                  print(cat_result.stderr, file=sys.stderr)
              try:
                  cat_report = json.loads(cat_result.stdout)
              except json.JSONDecodeError:
                  cat_report = None
              if cat_result.returncode != 0:
                  failed = True

              all_results.append({
                  'name': name,
                  'report': report,
                  'catalog_report': cat_report,
              })

          with open('/tmp/federation-results.json', 'w') as f:
              json.dump(all_results, f)

          sys.exit(1 if failed else 0)
          "

      - name: Post results as PR comment
        if: always() && steps.detect.outputs.has_modules == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const success = '${{ steps.validate.outcome }}' === 'success';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const shortSha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';

            const checkLabels = {
              clone: { name: 'Clone & access', desc: 'Repository cloned at pinned commit SHA' },
              federation_ref: { name: 'Commit SHA', desc: 'ref is a required 40-character commit SHA' },
              lola_structure: { name: 'Lola module schema', desc: 'Required fields: name, description, version, repository' },
              tier1_agentskills: { name: 'Tier 1', desc: 'agentskills.io spec compliance' },
              tier2_design_principles: { name: 'Tier 2', desc: 'Design principles compliance (warning only)' },
              mcp_version_pinning: { name: 'MCP pinning', desc: 'No `:latest` tags, no hardcoded credentials' },
              gitleaks: { name: 'Credential scan', desc: 'gitleaks secret detection' },
              catalog_present: { name: 'Catalog present', desc: 'federation/modules/<name>/.catalog/collection.yaml exists' },
              catalog_compliance: { name: 'Catalog compliance', desc: 'Schema, fragments, JSON mirror' },
              external_skill_roster: { name: 'Catalog roster', desc: 'Catalog skills match external pack at ref' },
              plugins_json_title: { name: 'plugins.json title', desc: 'Display title matches catalog name/id' },
              marketplace_catalog_metadata: { name: 'Marketplace alignment', desc: 'Version, description, repository match catalog' },
            };
            // Checks that warn instead of blocking the merge
            const warnOnlyChecks = new Set(['tier2_design_principles']);

            let moduleSections = '';
            try {
              const raw = fs.readFileSync('/tmp/federation-results.json', 'utf8');
              const results = JSON.parse(raw);
              for (const mod of results) {
                const report = mod.report;
                moduleSections += `\n### ${mod.name}\n\n`;
                if (!report || !report.checks) {
                  moduleSections += '> Could not parse validation results for this module.\n\n';
                  continue;
                }
                moduleSections += '| Check | Description | Status |\n';
                moduleSections += '|-------|-------------|--------|\n';
                for check of report.checks) {
                  const label = checkLabels[check.name] || { name: check.name, desc: '' };
                  const isWarnOnly = warnOnlyChecks.has(check.name);
                  const statusIcon = check.skipped ? '⚠️' : (check.passed ? '✅' : (isWarnOnly ? '⚠️' : '❌'));
                  moduleSections += `| ${label.name} | ${label.desc} | ${statusIcon} |\n`;
                }
                const catReport = mod.catalog_report;
                if (catReport && catReport.checks) {
                  moduleSections += '\n**Catalog cross-check**\n\n';
                  moduleSections += '| Check | Description | Status |\n';
                  moduleSections += '|-------|-------------|--------|\n';
                  for (const check of catReport.checks) {
                    const label = checkLabels[check.name] || { name: check.name, desc: '' };
                    const statusIcon = check.skipped ? '⚠️' : (check.passed ? '✅' : '❌');
                    moduleSections += `| ${label.name} | ${label.desc} | ${statusIcon} |\n`;
                  }
                }
                moduleSections += '\n';
              }
            } catch (e) {
              moduleSections = '\n> Could not parse validation results.\n\n';
            }

            const icon = success ? '✅' : '❌';
            const status = success ? 'ALL CHECKS PASSED' : 'VALIDATION FAILED';

            const body = [
              `## ${icon} Federation Validation: ${status}`,
              '',
              'Automated validation ran on federated modules (external repository) in `marketplace/rh-agentic-collection.yml`.',
              moduleSections,
              `[See workflow run for full details](${runUrl})`,
              '',
              '---',
              `<sub>Analyzed commit <code>${shortSha}</code> at ${timestamp}</sub>`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Skip (no federated modules)
        if: steps.detect.outputs.has_modules == 'false'
        run: echo "No federated modules found in marketplace YAML, nothing to validate."
