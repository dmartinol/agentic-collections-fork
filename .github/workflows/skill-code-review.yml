# Skill Code Review Workflow
#
# Automated code review using Google Gemini, validating PRs against project
# rules (CLAUDE.md, SKILL_DESIGN_PRINCIPLES.md, pack-level CLAUDE.md).
#
# Trigger methods:
#   1. PR comment:       Maintainer comments "/skill-code-review" or "/skill-code-review-all"
#   2. Reusable call:    Called by skill-ai-review.yml via workflow_call
#   3. Manual dispatch:  Triggered from Actions tab with PR number
#
# Security model:
#   - issue_comment runs from main branch (fork code never executes with secrets)
#   - Only maintainers listed in MAINTAINERS file can trigger via PR comments
#   - workflow_call trusts the calling workflow (skill-ai-review.yml) for auth

name: Skill Code Review

on:
  # Maintainer triggers review by commenting on a PR
  issue_comment:
    types: [created]

  # Called as reusable workflow by skill-ai-review.yml
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true
      head_sha:
        type: string
        required: true
    outputs:
      skipped:
        description: "true if review was skipped (missing credentials)"
        value: ${{ jobs.review.outputs.skipped }}
    secrets: inherit

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

# ---------------------------------------------------------------------------
# Gate job: validates the /skill-code-review command and authorizes the user.
# Only runs for issue_comment events.
# ---------------------------------------------------------------------------
jobs:
  gate:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '/skill-code-review-all') ||
        contains(github.event.comment.body, '/skill-code-review')
      ) &&
      !contains(github.event.comment.body, '/skill-ai-review')
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
      pr_number: ${{ steps.pr.outputs.number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}

    steps:
      # Checkout only the MAINTAINERS file from main — never from the PR branch
      - name: Checkout MAINTAINERS from main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: MAINTAINERS
          sparse-checkout-cone-mode: false

      # Verify the comment author is in the MAINTAINERS file
      - name: Check authorization
        id: auth
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          if ! [ -f MAINTAINERS ]; then
            echo "::error::MAINTAINERS file not found in default branch"
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -v '^#' MAINTAINERS | grep -v '^$' | grep -qx "$COMMENT_AUTHOR"; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
            echo "✅ $COMMENT_AUTHOR is authorized"
          else
            echo "authorized=false" >> "$GITHUB_OUTPUT"
            echo "❌ $COMMENT_AUTHOR is not in MAINTAINERS"
          fi

      - name: Reject unauthorized user
        if: steps.auth.outputs.authorized == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content="-1"

          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "❌ @${{ github.event.comment.user.login }} is not authorized to trigger code reviews. Only maintainers listed in \`MAINTAINERS\` can use \`/skill-code-review\` commands."

      - name: React with eyes
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content="eyes"

      - name: Get PR info
        if: steps.auth.outputs.authorized == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          HEAD_SHA=$(gh api "/repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "PR #$PR_NUMBER — HEAD: $HEAD_SHA"

  # ---------------------------------------------------------------------------
  # Review job: fetches the PR diff, builds context, and sends to Gemini.
  # ---------------------------------------------------------------------------
  review:
    needs: gate
    if: |
      always() && (
        (needs.gate.result == 'success' && needs.gate.outputs.authorized == 'true') ||
        github.event_name == 'workflow_call' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.gemini.outputs.skipped }}

    steps:
      # Resolve inputs from whichever trigger fired
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "pr_number=${{ needs.gate.outputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ needs.gate.outputs.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "standalone=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            echo "standalone=true" >> "$GITHUB_OUTPUT"
          else
            # workflow_call
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ inputs.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "standalone=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.inputs.outputs.head_sha || '' }}
          fetch-depth: 1

      # Fetch the PR diff via GitHub API (safe — doesn't execute PR code)
      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            -H "Accept: application/vnd.github.v3.diff" \
            "/repos/${{ github.repository }}/pulls/${{ steps.inputs.outputs.pr_number }}" \
            > /tmp/pr.diff

          DIFF_SIZE=$(wc -c < /tmp/pr.diff)
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"

          # Truncate large diffs to stay within LLM context limits
          if [ "$DIFF_SIZE" -gt 200000 ]; then
            head -c 200000 /tmp/pr.diff > /tmp/pr_truncated.diff
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            cp /tmp/pr.diff /tmp/pr_truncated.diff
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if empty diff
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No diff found, skipping review."

      # Build review context from project rules and pack-specific CLAUDE.md files
      - name: Build review context
        if: steps.diff.outputs.diff_size != '0'
        run: |
          set -euo pipefail
          {
            echo "=== PROJECT RULES: CLAUDE.md ==="
            cat CLAUDE.md 2>/dev/null || echo "(not found)"
            echo ""
            echo "=== PROJECT RULES: SKILL_DESIGN_PRINCIPLES.md ==="
            cat SKILL_DESIGN_PRINCIPLES.md 2>/dev/null || echo "(not found)"
          } > /tmp/project_rules.txt

          # Include pack-level rules for any packs touched by the PR
          CHANGED_PACKS=$(grep -oP '^diff --git a/([^/]+)/' /tmp/pr.diff | sort -u | sed 's|diff --git a/||;s|/||')
          for pack in $CHANGED_PACKS; do
            if [ -f "$pack/CLAUDE.md" ]; then
              {
                echo ""
                echo "=== PACK RULES: $pack/CLAUDE.md ==="
                cat "$pack/CLAUDE.md"
              } >> /tmp/project_rules.txt
            fi
          done

          head -c 50000 /tmp/project_rules.txt > /tmp/project_rules_truncated.txt

      - name: Build system instruction
        if: steps.diff.outputs.diff_size != '0'
        run: |
          set -euo pipefail
          cp .github/gemini-review-prompt.md /tmp/system_instruction.txt

          if [ "${{ steps.diff.outputs.truncated }}" = "true" ]; then
            printf '\n\nNote: This diff was truncated due to size. Review covers the first ~200KB only.' \
              >> /tmp/system_instruction.txt
          fi

          {
            cat /tmp/system_instruction.txt
            printf '\n\n---\n\nPROJECT RULES REFERENCE:\n\n'
            cat /tmp/project_rules_truncated.txt
          } > /tmp/system_full.txt

      # Call the Gemini API for code review
      - name: Review with Gemini
        id: gemini
        if: steps.diff.outputs.diff_size != '0'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY secret is not configured"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"

          jq -n \
            --rawfile system /tmp/system_full.txt \
            --rawfile diff /tmp/pr_truncated.diff \
            '{
              "systemInstruction": {
                "parts": [{ "text": $system }]
              },
              "contents": [{
                "parts": [{
                  "text": ("Review the following pull request diff:\n\n" + $diff)
                }]
              }],
              "generationConfig": {
                "temperature": 0.2,
                "maxOutputTokens": 8192
              }
            }' > /tmp/request.json

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent" \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -d @/tmp/request.json)

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Gemini API returned HTTP $HTTP_CODE"
            jq '{error: .error, status: .status}' /tmp/response.json
            exit 1
          fi

          REVIEW=$(jq -r '.candidates[0].content.parts[0].text // empty' /tmp/response.json)

          if [ -z "$REVIEW" ]; then
            echo "::error::Gemini returned empty review"
            jq '{promptFeedback: .promptFeedback, finishReason: .candidates[0].finishReason}' /tmp/response.json
            exit 1
          fi

          echo "$REVIEW" > /tmp/review.md

      # Upload review as artifact for the orchestrator to download
      - name: Upload review
        if: steps.diff.outputs.diff_size != '0' && steps.gemini.outputs.skipped != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gemini-review
          path: /tmp/review.md
          retention-days: 7

      # Post a standalone PR comment only when triggered directly (not via workflow_call).
      # When called by skill-ai-review.yml, the orchestrator posts the unified comment.
      - name: Post or update review comment
        if: >
          steps.inputs.outputs.standalone == 'true' &&
          steps.diff.outputs.diff_size != '0' &&
          steps.gemini.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.inputs.outputs.pr_number }}
        run: |
          set -euo pipefail
          MARKER="<!-- gemini-code-review -->"

          {
            echo "$MARKER"
            echo "## Gemini Code Review"
            echo ""
            cat /tmp/review.md
            echo ""
            echo "---"
            echo "*Automated review by Gemini | Rules: CLAUDE.md, SKILL_DESIGN_PRINCIPLES.md*"
          } > /tmp/comment.md

          EXISTING_COMMENT_ID=$(gh api --paginate \
            "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" \
            | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api --method PATCH \
              "/repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT_ID" \
              -f body="$(cat /tmp/comment.md)"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/comment.md
          fi
